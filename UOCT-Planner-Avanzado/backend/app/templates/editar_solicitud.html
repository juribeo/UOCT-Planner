{% extends "base.html" %}{% block content %}<h2>{{ modo }} solicitud{% if r %} #{{ r.id }}{% endif %}</h2><form class="edit" method="post" action="/guardar-solicitud"><input type="hidden" name="id" value="{{ r.id if r else '' }}"><label>Empresa<input name="empresa" value="{{ r.empresa if r else '' }}"></label><label>Proyecto<input name="proyecto" value="{{ r.proyecto if r else '' }}"></label><label>Municipio<input name="municipio" value="{{ r.municipio if r else '' }}"></label><label>Comuna<input name="comuna" value="{{ r.comuna if r else '' }}"></label><label>Dirección<input name="direccion" value="{{ r.direccion if r else '' }}"></label><label>Tipo<input name="tipo_actividad" value="{{ r.tipo_actividad if r else '' }}"></label><label>Estado<select name="estado">{% for e in estados %}<option value="{{ e }}" {% if r and r.estado==e %}selected{% endif %}>{{ e }}</option>{% endfor %}</select></label><label>Documentación<select name="estado_documental">{% for d in documentacion_opts %}<option value="{{ d }}" {% if r and r.estado_documental==d %}selected{% endif %}>{{ d }}</option>{% endfor %}</select></label><label>Prioridad<select name="prioridad">{% for p in prioridades %}<option value="{{ p }}" {% if r and r.prioridad==p %}selected{% endif %}>{{ p }}</option>{% endfor %}</select></label><label>Inspector<select name="inspector_asignado"><option value="">Sin asignar</option>{% for i in inspectores %}<option value="{{ i }}" {% if r and r.inspector_asignado==i %}selected{% endif %}>{{ i }}</option>{% endfor %}</select></label><label>Fecha solicitada<input name="fecha_solicitada" value="{{ r.fecha_solicitada if r else '' }}"></label><label>Fecha agendada<input type="date" name="fecha_agendada" value="{{ r.fecha_agendada if r else '' }}"></label><label>Hora<input name="hora_agendada" value="{{ r.hora_agendada if r else '' }}"></label><label>Contacto<input name="contacto" value="{{ r.contacto if r else '' }}"></label><label>Correo<input name="correo_contacto" value="{{ r.correo_contacto if r else '' }}"></label><label class="full">Observaciones<textarea name="observaciones">{{ r.observaciones if r else '' }}</textarea></label><div class="full actions"><button>Guardar</button><a class="btn secondary" href="/solicitudes">Volver</a></div></form>{% if historial %}<section class="panel"><h3>Historial</h3><table><tr><th>Fecha</th><th>Acción</th><th>Detalle</th><th>Usuario</th></tr>{% for h in historial %}<tr><td>{{ h.created_at }}</td><td>{{ h.accion }}</td><td>{{ h.detalle }}</td><td>{{ h.usuario }}</td></tr>{% endfor %}</table></section>{% endif %}{% endblock %}
